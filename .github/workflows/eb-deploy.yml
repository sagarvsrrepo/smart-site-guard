name: Elastic Beanstalk Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-eb:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dashboard dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r dashboard/requirements.txt

      - name: Validate dashboard Python
        run: |
          python -m py_compile dashboard/app.py

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Package dashboard source
        run: |
          cd dashboard
          zip -r ../dashboard-eb.zip .

      - name: Upload package to S3
        id: upload-package
        run: |
          S3_KEY="dashboard-${GITHUB_SHA::8}.zip"
          aws s3 cp ../dashboard-eb.zip s3://${{ secrets.EB_S3_BUCKET }}/$S3_KEY
          echo "s3_key=$S3_KEY" >> $GITHUB_OUTPUT

      - name: Create Elastic Beanstalk application version
        id: create-app-version
        run: |
          S3_KEY="${{ steps.upload-package.outputs.s3_key }}"
          APP_VERSION="dashboard-${GITHUB_SHA::8}-$(date +%Y%m%d%H%M%S)"
          aws elasticbeanstalk create-application-version \
            --application-name "${{ secrets.EB_APPLICATION_NAME }}" \
            --version-label "$APP_VERSION" \
            --source-bundle S3Bucket="${{ secrets.EB_S3_BUCKET }}",S3Key="$S3_KEY" \
            --region ${{ secrets.AWS_REGION }}
          echo "app_version=$APP_VERSION" >> $GITHUB_OUTPUT

      - name: Deploy to Elastic Beanstalk environment
        run: |
          APP_VERSION="${{ steps.create-app-version.outputs.app_version }}"
          aws elasticbeanstalk update-environment \
            --environment-name "${{ secrets.EB_ENVIRONMENT_NAME }}" \
            --version-label "$APP_VERSION" \
            --region ${{ secrets.AWS_REGION }}
