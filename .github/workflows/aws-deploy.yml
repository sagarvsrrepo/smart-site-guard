name: AWS Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r cloud/requirements.txt -r dashboard/requirements.txt -r fog/requirements.txt -r simulator/requirements.txt

      - name: Validate Python files
        run: |
          python -m py_compile dashboard/app.py fog/processor.py simulator/publisher.py

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy CloudFormation stack
        run: |
          STACK_NAME="${{ secrets.CLOUDFORMATION_STACK_NAME }}"
          STACK_NAME="${STACK_NAME:-SmartSiteGuardStack}"
          aws cloudformation deploy \
            --template-file cloud/template.yaml \
            --stack-name "$STACK_NAME" \
            --region ${{ secrets.AWS_REGION }} \
            --no-fail-on-empty-changeset
